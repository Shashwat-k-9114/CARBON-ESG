<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Carbon ESG Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">
    
    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8 border border-gray-100 my-8">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-green-950 tracking-tight">Create Account</h1>
            <p class="text-gray-500 mt-2 text-sm">Join the Carbon ESG Platform today.</p>
        </div>

        <!-- Form -->
        <form action="/register" method="POST" class="space-y-5">
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Full Name / Company Name</label>
                <input type="text" id="username" name="username" required 
                       class="block w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-900 focus:ring-2 focus:ring-green-500 focus:border-green-500 focus:bg-white transition-all duration-200 sm:text-sm outline-none" 
                       placeholder="Enter your name">
            </div>
            
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                <input type="email" id="email" name="email" required 
                       class="block w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-900 focus:ring-2 focus:ring-green-500 focus:border-green-500 focus:bg-white transition-all duration-200 sm:text-sm outline-none" 
                       placeholder="Enter your email">
            </div>
            
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" id="password" name="password" required 
                       class="block w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-900 focus:ring-2 focus:ring-green-500 focus:border-green-500 focus:bg-white transition-all duration-200 sm:text-sm outline-none" 
                       placeholder="Create a strong password">
            </div>

            <div>
                <label for="confirm_password" class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required 
                       class="block w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-gray-900 focus:ring-2 focus:ring-green-500 focus:border-green-500 focus:bg-white transition-all duration-200 sm:text-sm outline-none" 
                       placeholder="Confirm your password">
            </div>

            <button type="submit" class="w-full flex justify-center py-3.5 px-4 border border-transparent rounded-xl shadow-sm text-sm font-bold text-white bg-green-600 hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500 transition-all duration-200 mt-6">
                Create Account
            </button>
        </form>

        <!-- Footer -->
        <p class="mt-8 text-center text-sm text-gray-600">
            Already have an account? 
            <a href="/login" class="font-semibold text-green-600 hover:text-green-500 transition-colors">Sign in</a>
        </p>
    </div>

</body>
</html>
